<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #FFFFFF;
            background-position: center;
        }

        .login-form {
            background: #00B1E0;  
            border: 6px solid white;
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(25px);
            text-align: center;
            color: #ffffff; 
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        .login-title {
            font-size: 40px;
            margin-bottom: 40px;
            color: #ffffff;
        }
      
        .input-box {
            margin: 20px 0;
            position: relative;
        }

        .input-box input {
            width: 100%;
            background: #FFFFFF; 
            border: 2px solid #FFFFFF;
            padding: 12px 12px 12px 45px;
            border-radius: 99px;
            outline: none;
            transition: 0.3s;
            font-size: 17px;
            color: #1e293b; 
            font-weight: 600;
        }

        .input-box input::placeholder {
            color: #475569; 
            font-size: 17px;
            font-weight: 500;
        }

        .input-box input:focus {
            border-color: #ffffff;
            background: #FFFFFF;
            transform: scale(1.02);
        }

        .input-box input::-ms-reveal {
            filter: invert(100%);
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #000000; 
        }

        .remember-forgot-box {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 15px;
            color: #e2e8f0;
        }

        .remember-forgot-box label {
            display: flex;
            gap: 8px;
            cursor: pointer;
        }

        .remember-forgot-box input {
            accent-color: #ffffff;
            cursor: pointer;
        }

        .remember-forgot-box a {
            color: #FFFFFF;
            text-decoration: none;
        }

        .remember-forgot-box a:hover {
            text-decoration: underline;
        }

        .register {
            margin-top: 15px;
            font-size: 15px;
            color: #FFFFFF;
        }

        .register a {
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 500;
        }

        .register a:hover {
            text-decoration: underline;
        }

        :root {
            --hue: 223deg;
            --gray1: hsl(var(--hue) 10% 95%);
            --gray9: hsl(var(--hue) 10% 15%);
            --black: hsl(0 0% 0%);
            --primary3: hsl(var(--hue) 90% 75%);
            --primary5: hsl(var(--hue) 90% 55%);
            --primary6: hsl(var(--hue) 90% 45%);
            --trans-dur: 0.3s;
        }

        .creepy-btn {
            background-color: var(--black);
            border-radius: 1.25em;
            color: var(--gray1);
            cursor: pointer;
            letter-spacing: 1px;
            min-width: 10em;
            outline: 0.1875em solid transparent;
            transition: outline 0.1s linear;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            width: 60%;
            margin: 20px 0 0;
            display: block;
            font-size: 1rem;
            font-weight: 500;
        }

        .creepy-btn,
        .creepy-btn__cover,
        .creepy-btn__eye {
            position: relative;
        }

        .creepy-btn,
        .creepy-btn__pupil {
            background-color: var(--black);
        }

        .creepy-btn__cover {
            background-color: var(--primary5);
            border-radius: inherit;
            box-shadow: 0 0 0 0.125em var(--black) inset;
            padding: 0.5em 1em;
            display: block;
            transition: background-color var(--trans-dur), transform var(--trans-dur) cubic-bezier(0.65, 0, 0.35, 1);
            transform-origin: 1.25em 50%;
        }

        .creepy-btn__eyes {
            display: flex;
            align-items: center;
            gap: 0.375em;
            position: absolute;
            right: 1em;
            bottom: 0.5em;
            height: 0.75em;
        }

        .creepy-btn__eye {
            animation: eye-blink 3s infinite;
            background-color: var(--gray1);
            border-radius: 50%;
            overflow: hidden;
            width: 0.75em;
            height: 0.75em;
            position: relative;
        }

        .creepy-btn__pupil {
            aspect-ratio: 1;
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0.375em;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .creepy-btn:hover .creepy-btn__cover {
            background-color: var(--primary6);
            transform: rotate(-12deg);
        }

        .creepy-btn:active .creepy-btn__cover {
            transform: rotate(0);
        }

        @keyframes eye-blink {
            0%, 92%, 100% {
                animation-timing-function: cubic-bezier(0.32, 0, 0.67, 0);
                height: 0.75em;
            }
            96% {
                animation-timing-function: cubic-bezier(0.33, 1, 0.68, 1);
                height: 0;
            }
        }

        @media (max-width: 480px) {
            .login-form {
                width: 90%;
                padding: 20px;
            }
            .login-title {
                font-size: 32px;
                margin-bottom: 25px;
            }
            .input-box input {
                font-size: 14px;
                padding: 10px 10px 10px 40px;
            }
            .input-box i {
                font-size: 18px;
                left: 12px;
            }
            .remember-forgot-box {
                font-size: 13px;
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <form action="#" class="login-form">
        <h1 class="login-title">Login</h1>

        <div class="input-box">
            <i class='bx bxs-user'></i>
            <input type="text" placeholder="Username">
        </div>

        <div class="input-box">
            <i class='bx bxs-lock-alt'></i>
            <input type="password" placeholder="Password">
        </div>

        <div class="remember-forgot-box">
            <label for="remember">
                <input type="checkbox" id="remember"> Remember me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

        <!-- CREPPY BUTTON LANGSUNG DI CARD LOGIN -->
        <button type="submit" class="creepy-btn" id="creepyBtn">
            <span class="creepy-btn__eyes" id="eyes">
                <span class="creepy-btn__eye">
                    <span class="creepy-btn__pupil" id="pupilLeft"></span>
                </span>
                <span class="creepy-btn__eye">
                    <span class="creepy-btn__pupil" id="pupilRight"></span>
                </span>
            </span>
            <span class="creepy-btn__cover">Login</span>
        </button>

        <p class="register">
            Don't have an account?
            <a href="#">Register</a>
        </p>
    </form>

    <script>
        const btn = document.getElementById('creepyBtn');
        const eyesContainer = document.getElementById('eyes');
        const leftPupil = document.getElementById('pupilLeft');
        const rightPupil = document.getElementById('pupilRight');

        function updateEyes(e) {
            const rect = eyesContainer.getBoundingClientRect();
            const eyesCenterX = rect.left + rect.width / 2;
            const eyesCenterY = rect.top + rect.height / 2;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const dx = clientX - eyesCenterX;
            const dy = clientY - eyesCenterY;
            const angle = Math.atan2(-dy, dx) + Math.PI / 2;
            const distance = Math.hypot(dx, dy);
            const visionRangeX = 180;
            const visionRangeY = 75;
            const x = Math.sin(angle) * distance / visionRangeX;
            const y = Math.cos(angle) * distance / visionRangeY;
            
            const translateX = `${-50 + x * 50}%`;
            const translateY = `${-50 + y * 50}%`;
            const transform = `translate(${translateX}, ${translateY})`;
            
            leftPupil.style.transform = transform;
            rightPupil.style.transform = transform;
        }

        btn.addEventListener('mousemove', updateEyes);
        btn.addEventListener('touchmove', updateEyes);
        btn.addEventListener('mouseleave', () => {
            leftPupil.style.transform = 'translate(-50%, -50%)';
            rightPupil.style.transform = 'translate(-50%, -50%)';
        });
    </script>
</body>
</html>
