<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form - Glassmorphism Style</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('https://via.placeholder.com/1920x1080/1a2a3a/ffffff?text=Background+Image');
            background-size: cover;
            background-position: center;
        }

        .login-form {
            background: rgba(15, 154, 209, 0.15);
            border: 3px solid rgba(82, 85, 87, 0.3);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(25px);
            text-align: center;
            color: white;
            width: 400px;
            box-shadow: 0px 0px 20px 10px rgba(0, 0, 0, 0.15);
        }

        .login-title {
            font-size: 40px;
            margin-bottom: 40px;
        }
      
        .input-box {
            margin: 20px 0;
            position: relative;
        }

        .input-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 12px 12px 12px 45px;
            border-radius: 99px;
            outline: 3px solid transparent;
            transition: 0.3s;
            font-size: 17px;
            color: white;
            font-weight: 600;
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.8);
            font-size: 17px;
            font-weight: 500;
        }

        .input-box input:focus {
            outline: 3px solid rgba(255, 255, 255, 0.3);
        }

        .input-box input::-ms-reveal {
            filter: invert(100%);
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
        }

        .remember-forgot-box {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 15px;
        }

        .remember-forgot-box label {
            display: flex;
            gap: 8px;
            cursor: pointer;
        }

        .remember-forgot-box input {
            accent-color: white;
            cursor: pointer;
        }

        .remember-forgot-box a {
            color: white;
            text-decoration: none;
        }

        .remember-forgot-box a:hover {
            text-decoration: underline;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 10px 0;
            background: #2F9CF4;
            border: none;
            border-radius: 99px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #0B87EC;
        }

        /* Register Link */
        .register {
            margin-top: 15px;
            font-size: 15px;
        }

        .register a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .register a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-form {
                width: 90%;
                padding: 20px;
            }
            .login-title {
                font-size: 32px;
                margin-bottom: 25px;
            }
            .input-box input {
                font-size: 14px;
                padding: 10px 10px 10px 40px;
            }
            .input-box i {
                font-size: 18px;
                left: 12px;
            }
            .remember-forgot-box {
                font-size: 13px;
                flex-wrap: wrap;
                gap: 10px;
            }
            .login-btn {
                font-size: 14px;
                padding: 8px 0;
            }
        }
    </style>
</head>
<body>

<form action="#" class="login-form">
    <h1 class="login-title">Login</h1>
    <div class="input-box">
        <i class='bx bxs-user'></i>
        <input type="text" placeholder="Username">
    </div>
    <div class="input-box">
        <i class='bx bxs-lock-alt'></i>
        <input type="password" placeholder="Password">
    </div>
    <div class="remember-forgot-box">
        <label for="remember">
            <input type="checkbox" id="remember">
            Remember me
        </label>
        <a href="#">Forgot Password?</a>
    </div>
    <button class="login-btn">Login</button>
    <p class="register">
        Don't have an account?
        <a href="#">Register</a>
    </p>
</form>
</body>
</html>
