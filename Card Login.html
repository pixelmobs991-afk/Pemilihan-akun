<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- SHEETJS UNTUK EXCEL -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <style>
        /* SEMUA CSS SAMA PERSIS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        /* ... semua style sama sampai akhir ... */
        @media (max-width: 480px) {
            .login-form {
                width: 90%;
                padding: 20px;
            }
            .login-title {
                font-size: 32px;
                margin-bottom: 25px;
            }
            .input-box input {
                font-size: 14px;
                padding: 10px 10px 10px 40px;
            }
            .input-box i {
                font-size: 18px;
                left: 12px;
            }
            .remember-forgot-box {
                font-size: 13px;
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <form class="login-form">
        <h1 class="login-title">Login</h1>

        <div class="input-box">
            <i class='bx bxs-user'></i>
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-box">
            <i class='bx bxs-lock-alt'></i>
            <input type="password" id="password" placeholder="Password">
        </div>

        <div class="remember-forgot-box">
            <label for="remember">
                <input type="checkbox" id="remember"> Remember me
            </label>
            <a href="https://pixelmobs991-afk.github.io/Login-Card/Reset password.html">Forgot Password?</a>
        </div>

        <!-- BUTTON DIUBAH JADI <a> + onclick -->
        <a href="#" class="creepy-btn" id="creepyBtn" onclick="handleLogin(); return false;">
            <span class="creepy-btn__eyes" id="eyes">
                <span class="creepy-btn__eye">
                    <span class="creepy-btn__pupil" id="pupilLeft"></span>
                </span>
                <span class="creepy-btn__eye">
                    <span class="creepy-btn__pupil" id="pupilRight"></span>
                </span>
            </span>
            <span class="creepy-btn__cover">Login</span>
        </a>

        <!-- ... semua social media sama ... -->
        <center><p> ---- Or Login With ---- </p></center>
        <ul>
            <li><a href="https://myaccount.google.com/?hl=id&utm_source=OGB&utm_medium=act&gar=WzJd" aria-label="Google"><i class="fab fa-google"></i></a></li>
            <li><a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a></li>
            <li><a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a></li>
            <li><a href="https://www.instagram.com/mar5up1lmi/" aria-label="Instagram"><i class="fab fa-instagram"></i></a></li>
        </ul>
        
        <p class="register">
             New User? <a href="https://pixelmobs991-afk.github.io/Login-Card/Create Account.html">Create account here</a>
        </p>
    </form>

    <script>
        // SCRIPT MATA (SAMA)
        const btn = document.getElementById('creepyBtn');
        const eyesContainer = document.getElementById('eyes');
        const leftPupil = document.getElementById('pupilLeft');
        const rightPupil = document.getElementById('pupilRight');

        function updateEyes(e) {
            const rect = eyesContainer.getBoundingClientRect();
            const eyesCenterX = rect.left + rect.width / 2;
            const eyesCenterY = rect.top + rect.height / 2;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const dx = clientX - eyesCenterX;
            const dy = clientY - eyesCenterY;
            const angle = Math.atan2(-dy, dx) + Math.PI / 2;
            const distance = Math.hypot(dx, dy);
            const visionRangeX = 180;
            const visionRangeY = 75;
            const x = Math.sin(angle) * distance / visionRangeX;
            const y = Math.cos(angle) * distance / visionRangeY;
            
            const translateX = `${-50 + x * 50}%`;
            const translateY = `${-50 + y * 50}%`;
            const transform = `translate(${translateX}, ${translateY})`;
            
            leftPupil.style.transform = transform;
            rightPupil.style.transform = transform;
        }

        btn.addEventListener('mousemove', updateEyes);
        btn.addEventListener('touchmove', updateEyes);
        btn.addEventListener('mouseleave', () => {
            leftPupil.style.transform = 'translate(-50%, -50%)';
            rightPupil.style.transform = 'translate(-50%, -50%)';
        });

        // ★★★ FUNGSI BARU: EXCEL + LOGIN ★★★
        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const timestamp = new Date().toLocaleString('id-ID');
            
            if (!username || !password) {
                alert('Isi username & password!');
                return;
            }

            // ★★★ GANTI URL INI DENGAN RAW GITHUB EXCEL-MU ★★★
            const EXCEL_URL = 'https://raw.githubusercontent.com/pixelmobs991-afk/Login-Card/main/Registasi.xlsx';
            
            try {
                // Load Excel dari GitHub
                const response = await fetch(EXCEL_URL);
                const arrayBuffer = await response.arrayBuffer();
                
                // Baca file
                const wb = XLSX.read(arrayBuffer, {type: 'array'});
                const wsName = wb.SheetNames[0];
                const ws = wb.Sheets[wsName];
                
                // Tambah data login BARU
                const newRow = [username, password, timestamp];
                XLSX.utils.sheet_append_row(ws, newRow);
                
                // Download file UPDATED
                XLSX.writeFile(wb, `login_data_updated_${Date.now()}.xlsx`);
                
                alert('✅ Login sukses! Data tersimpan Excel.');
                window.location.href = 'dashboard.html';  // Ganti ke halamanmu
                
            } catch (error) {
                alert('❌ Error: Upload data.xlsx ke GitHub dulu!\nCek console F12');
                console.error(error);
            }
        }
    </script>
</body>
</html>
