<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #FFFFFF;
            background-position: center;
        }

        .login-form {
            background: #00B1E0;  
            border: 6px solid white;
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(25px);
            text-align: center;
            color: #ffffff; 
            width: 400px;
            box-shadow: 0 10px 30px #00000040;
        }

        .login-title {
            font-size: 40px;
            margin-bottom: 40px;
        }
      
        .input-box {
            margin: 20px 0;
            position: relative;
        }

        .input-box input {
            width: 100%;
            background: #FFFFFF; 
            border: 2px solid #FFFFFF;
            padding: 12px 12px 12px 45px;
            border-radius: 99px;
            outline: none;
            transition: 0.3s;
            font-size: 17px;
            color: #1e293b; 
            font-weight: 600;
        }

        .input-box input::placeholder {
            color: #475569; 
            font-size: 17px;
            font-weight: 500;
        }

        .input-box input:focus {
            border-color: #ffffff;
            background: #FFFFFF;
            transform: scale(1.02);
        }

        .input-box input::-ms-reveal {
            filter: invert(100%);
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #000000; 
        }

        .remember-forgot-box {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 15px;
            color: #e2e8f0;
        }

        .remember-forgot-box label {
            display: flex;
            gap: 8px;
            cursor: pointer;
        }

        .remember-forgot-box input {
            accent-color: #ffffff;
            cursor: pointer;
        }

        .remember-forgot-box a {
            color: #FFFFFF;
            text-decoration: none;
        }

        .remember-forgot-box a:hover {
            text-decoration: underline;
        }

        .register {
            margin-top: 15px;
            font-size: 15px;
            color: #FFFFFF;
        }

        .register a {
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 500;
        }

        .register a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-form {
                width: 90%;
                padding: 20px;
            }
            .login-title {
                font-size: 32px;
                margin-bottom: 25px;
            }
            .input-box input {
                font-size: 14px;
                padding: 10px 10px 10px 40px;
            }
            .input-box i {
                font-size: 18px;
                left: 12px;
            }
            .remember-forgot-box {
                font-size: 13px;
                flex-wrap: wrap;
                gap: 10px;
            }
            .login-btn {
                font-size: 14px;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>

<form action="#" class="login-form">
    <h1 class="login-title">Login</h1>
    <div class="input-box">
        <i class='bx bxs-user'></i>
        <input type="text" placeholder="Username">
    </div>
    <div class="input-box">
        <i class='bx bxs-lock-alt'></i>
        <input type="password" placeholder="Password">
    </div>
    <div class="remember-forgot-box">
        <label for="remember">
            <input type="checkbox" id="remember">Remember me</label>
        <a href="#">Forgot Password?</a>
    </div>
    <button class="login-btn">Login</button>
    <p class="register">
        Don't have an account?
        <a href="#">Register</a>
    </p>
</form>
</body>
</html>
