<!DOCTYPE html>
<html>
<head>
  <title>Form Survei Custom</title>
  <style>
    body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; background: #f9f9f9; }
    h2 { color: #4285f4; }
    label { display: block; margin: 15px 0 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { background: #4285f4; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
    button:hover { background: #3367d6; }
    #response { margin-top: 20px; padding: 10px; border-radius: 4px; display: none; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>
  <form id="surveyForm">
    <h2>Survei Custom Mirip Google Form</h2>
    <label>Nama Lengkap:</label>
    <input type="text" id="nama" required minlength="2">
    
    <label>Email:</label>
    <input type="email" id="email" required>
    
    <label>Pilih Jenis Kelamin:</label>
    <select id="jenis_kelamin" required>
      <option value="">Pilih...</option>
      <option value="Laki-laki">Laki-laki</option>
      <option value="Perempuan">Perempuan</option>
    </select>
    
    <label>Hobi (pilih banyak):</label>
    <label><input type="checkbox" value="Coding"> Coding</label>
    <label><input type="checkbox" value="Arduino"> Arduino</label>
    <label><input type="checkbox" value="Web Dev"> Web Development</label>
    
    <label>Komentar:</label>
    <textarea id="komentar" rows="4"></textarea>
    
    <button type="submit">Kirim Survei</button>
  </form>
  
  <div id="response"></div>
  
  <script>
    document.getElementById('surveyForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      let nama = document.getElementById('nama').value.trim();
      let email = document.getElementById('email').value.trim();
      let jk = document.getElementById('jenis_kelamin').value;
      
      if (nama.length < 2) {
        showResponse('Nama minimal 2 huruf!', 'error');
        return;
      }
      if (!email.includes('@')) {
        showResponse('Email tidak valid!', 'error');
        return;
      }
      if (!jk) {
        showResponse('Pilih jenis kelamin!', 'error');
        return;
      }
      
      let hobi = [];
      document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
        hobi.push(cb.value);
      });
      
      let data = {
        nama: nama,
        email: email,
        jenis_kelamin: jk,
        hobi: hobi,
        komentar: document.getElementById('komentar').value,
        timestamp: new Date().toLocaleString('id-ID')
      };
      
      let allData = JSON.parse(localStorage.getItem('surveyData') || '[]');
      allData.push(data);
      localStorage.setItem('surveyData', JSON.stringify(allData));
      
      showResponse('Terima kasih! Data tersimpan. Lihat console atau localStorage.', 'success');
      
      this.reset();
    });
    
    function showResponse(msg, type) {
      let resp = document.getElementById('response');
      resp.textContent = msg;
      resp.className = type;
      resp.style.display = 'block';
      setTimeout(() => resp.style.display = 'none', 5000);
    }
    
    console.log('Data survei tersimpan di localStorage.surveyData');
  </script>
</body>
</html>
