<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .register-title {
            font-size: 32px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 32px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .signup-btn {
            width: 100%;
            padding: 18px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
        }

        .signup-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(59,130,246,0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .login-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .row {
                grid-template-columns: 1fr;
            }
            .register-container {
                margin: 10px;
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1 class="register-title">Create Account</h1>
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" class="input-field" placeholder="Enter your username">
        </div>

        <div class="row">
            <div class="input-group">
                <label>First Name</label>
                <input type="text" class="input-field" placeholder="First name">
            </div>
            <div class="input-group">
                <label>Last Name</label>
                <input type="text" class="input-field" placeholder="Last name">
            </div>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" class="input-field" placeholder="you@example.com">
        </div>

        <button class="signup-btn">Sign up</button>

        <div class="login-link">
            <p>Already have an account? <a href="https://pixelmobs991-afk.github.io/Card-login-akun/Card%20Login.html">Sign in</a></p>
        </div>
    </div>
</body>
</html>
