<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Form Input ke Excel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    form {
      max-width: 400px;
      margin: 0 auto;
    }
    input {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      box-sizing: border-box;
    }
    button {
      background: #007cba;
      color: white;
      border: none;
      padding: 10px 16px;
      cursor: pointer;
    }
    button:hover {
      background: #005a87;
    }
    #result {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <form id="myForm">
    <input type="text" name="nama" placeholder="Nama" required />
    <input type="email" name="email" placeholder="Email" required />
    <button type="submit">Kirim</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById("myForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const result = document.getElementById("result");

      // GANTI URL INI DENGAN LINK WEB APP DARI GOOGLE APPS SCRIPT
      const url = "https://studentutac-my.sharepoint.com/:x:/r/personal/860194136_ecampus_ut_ac_id/_layouts/15/Doc.aspx?sourcedoc=%7B6713B2A2-A6E5-460A-9E37-E133748B3C53%7D&file=Book.xlsx&action=default&mobileredirect=true&DefaultItemOpen=1&wdOrigin=SEARCHENGINE.GOOGLE%2CAPPHOME-WEB.JUMPBACKIN&wdPreviousSession=eebb4be3-25c5-45f8-a306-154441d33d8d&wdPreviousSessionSrc=AppHomeWeb&ct=1777811417443";

      try {
        const res = await fetch(url, {
          method: "POST",
          body: formData
        });
        const text = await res.text();
        result.innerHTML = "<p style='color:green;'>Data berhasil dikirim!</p>";
        console.log(text);
      } catch (err) {
        result.innerHTML = "<p style='color:red;'>Gagal mengirim data.</p>";
        console.error(err);
      }

      // Bersihkan form setelah kirim
      e.target.reset();
    });
  </script>
</body>
</html>
